<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResearchNest Dashboard</title>
  <link rel="stylesheet" href="../dashboard.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon48.png" class="logo-img" alt="" />
        <h1 class="logo-title">ResearchNest</h1>
      </div>
      <div class="header-right">
        <input type="search" id="search-input" placeholder="Search sessions, tabs, keywords…" class="search-input" />
        <button id="btn-new-session" class="btn btn-primary">+ New Session</button>
        <button id="btn-options" class="btn btn-ghost">Settings</button>
      </div>
    </header>

    <main class="main">
      <!-- Sidebar: session list -->
      <aside class="sidebar" id="sidebar">
        <h2 class="sidebar-title">Sessions</h2>
        <div id="session-list" class="session-list">
          <p class="empty-msg">No sessions yet.</p>
        </div>
      </aside>

      <!-- Content: session detail -->
      <section class="content" id="content">
        <div id="welcome" class="welcome">
          <div class="welcome-icon">🪺</div>
          <h2>Welcome to ResearchNest</h2>
          <p>Open the extension popup and click <strong>Cluster My Tabs</strong> to instantly group your research tabs by topic.</p>
          <button id="btn-welcome-start" class="btn btn-primary">Cluster My Tabs</button>
        </div>

        <div id="session-detail" class="session-detail hidden">
          <div class="detail-header">
            <div class="detail-title-row">
              <h2 id="detail-title" class="detail-title" contenteditable="false"></h2>
              <button id="btn-edit-title" class="btn-icon" title="Edit title">✏️</button>
              <span id="detail-date" class="detail-date"></span>
            </div>
            <div class="detail-actions">
              <button id="btn-export" class="btn btn-ghost">Export Markdown</button>
              <button id="btn-delete" class="btn btn-ghost btn-danger-ghost">Delete Session</button>
            </div>
          </div>

          <!-- Summary panel -->
          <div id="summary-panel" class="summary-panel hidden">
            <h3>Session Summary</h3>
            <p id="summary-text"></p>
            <div id="takeaways-section" class="hidden">
              <h4>Key Takeaways</h4>
              <ul id="takeaways-list"></ul>
            </div>
            <div id="questions-section" class="hidden">
              <h4>Open Questions</h4>
              <ul id="questions-list"></ul>
            </div>
          </div>

          <!-- Cluster lanes -->
          <div id="cluster-grid" class="cluster-lanes"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Tab detail modal -->
  <div id="tab-modal-backdrop" class="tab-modal-backdrop hidden">
    <div id="tab-modal" class="tab-modal" role="dialog" aria-modal="true">
      <button id="tab-modal-close" class="tab-modal-close" aria-label="Close">&times;</button>
      <div class="tab-modal-header">
        <img id="modal-favicon" class="modal-favicon" src="" alt="" />
        <div class="modal-title-block">
          <h2 id="modal-title" class="modal-title"></h2>
          <a id="modal-url" class="modal-url" href="#" target="_blank" rel="noopener"></a>
        </div>
      </div>
      <div class="modal-meta">
        <span id="modal-dwell" class="modal-meta-item"></span>
        <span id="modal-duplicate" class="modal-meta-item modal-dup hidden">Duplicate tab</span>
      </div>
      <div class="modal-summary">
        <div id="modal-spinner" class="modal-spinner hidden">
          <div class="spinner"></div>
          <span>Generating summary…</span>
        </div>
        <ul id="modal-bullets" class="modal-bullets"></ul>
      </div>
      <div class="modal-actions">
        <button id="tab-modal-close-btn" class="btn btn-ghost">Close</button>
        <a id="modal-open-tab" class="btn btn-primary" href="#" target="_blank" rel="noopener">Open in New Tab</a>
      </div>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
